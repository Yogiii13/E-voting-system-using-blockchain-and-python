<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Blockchain Voting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .candidates-list {
            margin: 20px 0;
        }

        .candidate-option {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 10px 0;
            background: #f5f5f5;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .candidate-option:hover {
            background: #e8e8ff;
        }

        .candidate-option input[type="radio"] {
            margin-right: 12px;
            width: auto;
            cursor: pointer;
        }

        .candidate-option label {
            margin: 0;
            cursor: pointer;
            width: 100%;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
            font-weight: 600;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
            display: block;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .data-display {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
        }

        .data-display h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .data-content {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .data-content table {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1em;
        }

        .results-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 3px;
        }

        .results-item strong {
            color: #667eea;
        }

        @media (max-width: 768px) {
            .main-grid, .dashboard {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Secure Blockchain Voting</h1>
            <p>Cast your vote securely on the blockchain</p>
        </header>

        <div class="main-grid">
            <!-- Voting Portal -->
            <div class="card">
                <h2>Voter Portal</h2>
                
                <div id="alert" class="alert"></div>

                <div class="form-group">
                    <label for="voter-id">Voter ID:</label>
                    <input type="text" id="voter-id" placeholder="Enter ID starting with A, B, or C" maxlength="50">
                    <small style="color: #666; margin-top: 5px; display: block;">Examples: A001, B123, C999</small>
                </div>

                <div class="form-group">
                    <label>Constituency:</label>
                    <div id="constituency-display" style="padding: 12px; background: #f5f5f5; border-radius: 5px; color: #999;">
                        Enter voter ID first
                    </div>
                </div>

                <div class="form-group">
                    <label>Select Candidate:</label>
                    <div id="candidates-list" class="candidates-list">
                        <p style="color: #999;">Enter a valid voter ID first</p>
                    </div>
                </div>

                <button onclick="castVote()">Cast Vote</button>
                <button class="btn-secondary" onclick="resetForm()">Reset Form</button>
            </div>

            <!-- Dashboard Controls -->
            <div class="card">
                <h2>Dashboard</h2>
                
                <div style="margin-bottom: 30px;">
                    <h3 style="color: #667eea; margin-bottom: 15px;">Quick Actions</h3>
                    
                    <button onclick="viewBlockchain()" style="margin-bottom: 10px;">📊 View Blockchain</button>
                    <button onclick="showResults()" style="margin-bottom: 10px;">📈 Election Results</button>
                    <button class="btn-secondary" onclick="openAdminView()">🔑 Commission Login</button>
                </div>

                <div style="background: #f9f9f9; padding: 15px; border-radius: 5px; border-left: 4px solid #667eea;">
                    <h4 style="color: #667eea; margin-bottom: 10px;">📋 System Status</h4>
                    <p>Total Blocks: <strong id="block-count">1</strong></p>
                    <p>Total Votes Cast: <strong id="vote-count">0</strong></p>
                </div>
            </div>
        </div>

        <!-- Data Display Section -->
        <div class="dashboard" id="data-section" style="display: none; margin-top: 30px;">
            <div class="data-display">
                <h3 id="data-title">Blockchain</h3>
                <div class="data-content" id="data-content"></div>
                <button onclick="closeDataDisplay()" class="btn-secondary" style="margin-top: 15px;">Close</button>
            </div>
        </div>
    </div>

    <script>
        const voterIdInput = document.getElementById('voter-id');
        
        voterIdInput.addEventListener('input', updateConstituency);

        function updateConstituency() {
            const voterId = voterIdInput.value.trim();
            const constituencyDisplay = document.getElementById('constituency-display');
            const candidatesList = document.getElementById('candidates-list');

            if (!voterId) {
                constituencyDisplay.textContent = 'Enter voter ID first';
                constituencyDisplay.style.color = '#999';
                candidatesList.innerHTML = '<p style="color: #999;">Enter a valid voter ID first</p>';
                return;
            }

            const constituency = voterId[0].toUpperCase();

            if (!['A', 'B', 'C'].includes(constituency)) {
                constituencyDisplay.textContent = 'Invalid constituency (use A, B, or C)';
                constituencyDisplay.style.color = '#c3e6cb';
                candidatesList.innerHTML = '<p style="color: #999;">Invalid voter ID format</p>';
                return;
            }

            constituencyDisplay.textContent = `Constituency: ${constituency}`;
            constituencyDisplay.style.color = '#155724';

            fetch(`/api/candidates/${constituency}`)
                .then(r => r.json())
                .then(candidates => {
                    if (Object.keys(candidates).length === 0) {
                        candidatesList.innerHTML = '<p style="color: #999;">No candidates available</p>';
                        return;
                    }

                    candidatesList.innerHTML = '';
                    for (const [id, name] of Object.entries(candidates)) {
                        const div = document.createElement('div');
                        div.className = 'candidate-option';
                        div.innerHTML = `
                            <input type="radio" name="candidate" value="${id}" id="candidate-${id}">
                            <label for="candidate-${id}">${id}. ${name}</label>
                        `;
                        candidatesList.appendChild(div);
                    }
                });
        }

        function castVote() {
            const voterId = document.getElementById('voter-id').value.trim();
            const selectedCandidate = document.querySelector('input[name="candidate"]:checked');

            if (!voterId) {
                showAlert('error', 'Please enter your voter ID');
                return;
            }

            if (!selectedCandidate) {
                showAlert('error', 'Please select a candidate');
                return;
            }

            fetch('/api/cast-vote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    voter_id: voterId,
                    candidate_id: selectedCandidate.value
                })
            })
            .then(r => {
                if (!r.ok) {
                    return r.json().then(err => Promise.reject(err));
                }
                return r.json();
            })
            .then(data => {
                if (data.success) {
                    showAlert('success', data.message);
                    setTimeout(() => {
                        resetForm();
                        updateStatus();
                    }, 1500);
                } else {
                    showAlert('error', data.error || 'Vote casting failed');
                }
            })
            .catch(err => {
                showAlert('error', err.error || 'Network error: ' + err.message);
            });
        }

        function resetForm() {
            document.getElementById('voter-id').value = '';
            document.querySelectorAll('input[name="candidate"]').forEach(radio => {
                radio.checked = false;
            });
            document.getElementById('alert').className = 'alert';
            document.getElementById('alert').textContent = '';
            updateConstituency();
        }

        function showAlert(type, message) {
            const alert = document.getElementById('alert');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            setTimeout(() => {
                if (alert.className.includes(type)) {
                    alert.className = 'alert';
                }
            }, 5000);
        }

        function viewBlockchain() {
            fetch('/api/blockchain')
                .then(r => r.json())
                .then(data => {
                    if (data.length === 0) {
                        showDataDisplay('Blockchain Data', 'No blocks in the blockchain');
                        return;
                    }
                    let tableHtml = '<table style="width: 100%; border-collapse: collapse;">';
                    tableHtml += '<thead><tr style="background: #667eea; color: white;">';
                    tableHtml += '<th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Block #</th>';
                    tableHtml += '<th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Timestamp</th>';
                    tableHtml += '<th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Votes Count</th>';
                    tableHtml += '<th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Proof</th>';
                    tableHtml += '<th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Previous Hash</th>';
                    tableHtml += '</tr></thead><tbody>';
                    
                    for (const block of data) {
                        const timestamp = new Date(block.timestamp * 1000).toLocaleString();
                        const prevHash = block.previous_hash.substring(0, 16) + '...';
                        tableHtml += '<tr>';
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd; text-align: center; font-weight: bold;">${block.index}</td>`;
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd; text-align: center; font-size: 0.9em;">${timestamp}</td>`;
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd; text-align: center;">${block.votes.length}</td>`;
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd; text-align: center; font-size: 0.85em; font-family: monospace;">${block.proof}</td>`;
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd; font-size: 0.85em; font-family: monospace;">${prevHash}</td>`;
                        tableHtml += '</tr>';
                    }
                    
                    tableHtml += '</tbody></table>';
                    showDataDisplayHTML('Blockchain Data', tableHtml);
                })
                .catch(err => showAlert('error', 'Failed to fetch blockchain: ' + err.message));
        }

        function showResults() {
            fetch('/api/results')
                .then(r => r.json())
                .then(data => {
                    if (Object.keys(data).length === 0) {
                        showDataDisplay('Election Results', 'No votes have been cast yet.');
                        return;
                    }
                    let tableHtml = '';
                    for (const [constituency, results] of Object.entries(data)) {
                        tableHtml += `<h3 style="margin: 20px 0 15px 0; color: #667eea;">Constituency ${constituency}</h3>`;
                        tableHtml += '<table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">';
                        tableHtml += '<thead><tr style="background: #667eea; color: white;">';
                        tableHtml += '<th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Candidate ID</th>';
                        tableHtml += '<th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Candidate Name</th>';
                        tableHtml += '<th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Votes</th>';
                        tableHtml += '</tr></thead><tbody>';
                        
                        let totalVotes = 0;
                        for (const result of results) {
                            tableHtml += '<tr>';
                            tableHtml += `<td style="padding: 12px; border: 1px solid #ddd;">${result.id}</td>`;
                            tableHtml += `<td style="padding: 12px; border: 1px solid #ddd;">${result.name}</td>`;
                            tableHtml += `<td style="padding: 12px; border: 1px solid #ddd; text-align: center; font-weight: bold;">${result.votes}</td>`;
                            tableHtml += '</tr>';
                            totalVotes += result.votes;
                        }
                        
                        tableHtml += '<tr style="background: #f0f0f0; font-weight: bold;">';
                        tableHtml += `<td colspan="2" style="padding: 12px; border: 1px solid #ddd; text-align: right;">Total Votes:</td>`;
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd; text-align: center; color: #667eea;">${totalVotes}</td>`;
                        tableHtml += '</tr>';
                        
                        tableHtml += '</tbody></table>';
                    }
                    showDataDisplayHTML('Election Results', tableHtml);
                })
                .catch(err => showAlert('error', 'Failed to fetch results: ' + err.message));
        }

        function openAdminView() {
            const loginId = prompt('Enter Commission Login ID:');
            if (!loginId) return;

            const constituency = prompt('Enter Constituency (A/B/C):');
            if (!constituency) return;

            fetch('/api/commission-view', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    login_id: loginId,
                    constituency: constituency
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const commissionData = data.data;
                    let tableHtml = `<h3 style="margin-bottom: 15px;">Constituency ${commissionData.constituency}</h3>`;
                    tableHtml += `<p style="margin-bottom: 15px; font-weight: bold;">Total Votes: ${commissionData.total_votes}</p>`;
                    tableHtml += '<table style="width: 100%; border-collapse: collapse;">';
                    tableHtml += '<thead><tr style="background: #667eea; color: white;">';
                    tableHtml += '<th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Candidate ID</th>';
                    tableHtml += '<th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Candidate Name</th>';
                    tableHtml += '<th style="padding: 12px; text-align: center; border: 1px solid #ddd;">Votes</th>';
                    tableHtml += '</tr></thead><tbody>';
                    
                    for (const candidate of commissionData.candidates) {
                        tableHtml += '<tr>';
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd;">${candidate.candidate_id}</td>`;
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd;">${candidate.name}</td>`;
                        tableHtml += `<td style="padding: 12px; border: 1px solid #ddd; text-align: center; font-weight: bold;">${candidate.votes}</td>`;
                        tableHtml += '</tr>';
                    }
                    
                    tableHtml += '</tbody></table>';
                    showDataDisplayHTML('Election Commission View', tableHtml);
                } else {
                    showAlert('error', data.error);
                }
            })
            .catch(err => showAlert('error', 'Failed to fetch commission view: ' + err.message));
        }

        function showDataDisplay(title, content) {
            document.getElementById('data-title').textContent = title;
            document.getElementById('data-content').textContent = content;
            document.getElementById('data-section').style.display = 'grid';
        }

        function showDataDisplayHTML(title, content) {
            document.getElementById('data-title').textContent = title;
            document.getElementById('data-content').innerHTML = content;
            document.getElementById('data-content').style.fontFamily = 'Arial, sans-serif';
            document.getElementById('data-content').style.fontFamily = 'inherit';
            document.getElementById('data-section').style.display = 'grid';
        }

        function closeDataDisplay() {
            document.getElementById('data-section').style.display = 'none';
        }

        function updateStatus() {
            fetch('/api/blockchain')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('block-count').textContent = data.length;
                    let voteCount = 0;
                    for (const block of data) {
                        voteCount += block.votes.length;
                    }
                    document.getElementById('vote-count').textContent = voteCount;
                })
                .catch(err => console.error('Status update failed:', err));
        }

        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
